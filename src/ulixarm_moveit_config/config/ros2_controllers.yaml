# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    ulixarm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    ulixhand_controller:
      type: position_controllers/GripperActionController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ulixarm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true

ulixhand_controller:
  ros__parameters:
    joint: finger_right_joint
    allow_stalling: true
    stall_velocity_threshold: 0.1
    stall_timeout: 0.1
    max_effort: 0.5